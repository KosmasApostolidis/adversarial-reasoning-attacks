name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps the runner slim; tests don't need CUDA.
          pip install --index-url https://download.pytorch.org/whl/cpu \
            torch torchvision
          pip install -e .[dev]

      - name: Run pytest (skip gpu / slow / integration)
        run: |
          pytest -q -m "not gpu and not slow and not integration" \
            --cov=adversarial_reasoning --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
