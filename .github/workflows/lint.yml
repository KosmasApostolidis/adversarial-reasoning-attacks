name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install "ruff>=0.6"

      - name: ruff check
        run: ruff check src/ scripts/ tests/

      - name: ruff format check
        run: ruff format --check src/ scripts/ tests/

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + types
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch — mypy needs the package importable.
          pip install --index-url https://download.pytorch.org/whl/cpu \
            torch torchvision
          pip install -e .[dev] types-PyYAML

      - name: mypy src/
        run: mypy src/

  lock-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install "uv>=0.5"

      - name: Verify requirements.lock is in sync with pyproject.toml
        run: make lock-check
