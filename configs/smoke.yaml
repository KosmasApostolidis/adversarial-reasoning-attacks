# Smoke run: 1 model × 1 attack × 1 task × 1 ε × 1 seed. <15 min total.
# Used for Phase 0 sanity + CI integration test.

experiment:
  name: smoke
  phase: "0"
  seeds: [0]
  output_dir: runs/smoke

  models:
    - qwen2_5_vl_7b               # strongest native tool-calling, least variance

  tasks:
    - prostate_mri_workup

  task_overrides:
    prostate_mri_workup:
      dataset_split:
        val: 5

  attacks:
    - pgd_linf

  attack_overrides:
    pgd_linf:
      epsilons: [0.0314]          # 8/255 only
      steps: [20]
      random_restarts: [1]

  statistics:
    test: wilcoxon_signed_rank
    bootstrap_resamples: 1000
    ci_level: 0.95
    multiple_comparison_correction: none

  transfer_evaluation:
    source: hf_fp16
    target: ollama_q4
    same_images: true
