# Phase 0f baseline: undefended InternVL2-8B under PGD-L∞ at the canonical
# T3 eval budget (4/255, 8/255). Pairs 1:1 with defended_internvl2.yaml on
# seed/task/attack/eps to make a valid Wilcoxon signed-rank input for the
# T3 gate.
#
# Selected as the third VLM in the active benchmark, replacing the
# same-family llava_v1_6_vicuna_13b (only-LM-backbone diversity) AND the
# gated meta-llama/Llama-3.2-11B-Vision-Instruct (no Meta license grant).
# InternLM-2-7B LM + InternViT-300M vision encoder give true cross-family
# diversity. Open access (no HF gating).
#
# Output records.jsonl is consumed by:
#   art-eval-robust --baseline-records <records.jsonl>
# in the adversarial-reasoning-training repo.

experiment:
  name: phase0f_baseline_internvl2
  phase: "0"
  seeds: [0]
  output_dir: ../adversarial-reasoning-training/runs/baseline_internvl2

  models:
    - internvl2_8b

  tasks:
    - prostate_mri_workup
    - rad_vqa_action
    - prostate_mri_targeted

  attacks:
    - pgd_linf

  # Canonical T3 eval suite (configs/defenses.yaml :: pgd.eval_eps).
  epsilons_linf: [0.0157, 0.0314]
