# Phase 2 defended: adv-FT'd InternVL3-8B under PGD-L∞ at the
# canonical T3 eval budget (4/255, 8/255). Pairs 1:1 with
# baseline_internvl3.yaml on seed/task/attack/eps; only the model_key differs.
#
# The checkpoint path is owned by configs/models.yaml under model_key
# `defended_internvl3_8b` (hf_dir produced by
# adversarial-reasoning-training/scripts/ckpt_to_hf_dir.py from the
# Phase 2 adv-FT best.pt). Re-export the hf_dir whenever adv-FT reruns.
#
# Output records.jsonl is consumed by:
#   art-eval-robust --defended-records <records.jsonl>

experiment:
  name: phase2_defended_internvl3
  phase: "0"
  seeds: [0]
  output_dir: ../adversarial-reasoning-training/runs/internvl3_main_seed0

  models:
    - defended_internvl3_8b

  tasks:
    - prostate_mri_workup
    - rad_vqa_action
    - prostate_mri_targeted

  attacks:
    - pgd_linf

  # Canonical T3 eval suite (configs/defenses.yaml :: pgd.eval_eps).
  epsilons_linf: [0.0157, 0.0314]
