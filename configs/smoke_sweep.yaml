# ε-sweep smoke: single model, single task, full ε sweep 2/4/8/16/255.

experiment:
  name: smoke_sweep
  phase: "1"
  seeds: [0]
  output_dir: runs/smoke_sweep

  models:
    - qwen2_5_vl_7b

  tasks:
    - prostate_mri_workup

  task_overrides:
    prostate_mri_workup:
      dataset_split:
        val: 5

  attacks:
    - pgd_linf

  attack_overrides:
    pgd_linf:
      epsilons: [0.0078, 0.0157, 0.0314, 0.0627]   # 2/255, 4/255, 8/255, 16/255
      steps: [20]
      random_restarts: [1]

  statistics:
    test: wilcoxon_signed_rank
    bootstrap_resamples: 1000
    ci_level: 0.95
    multiple_comparison_correction: none

  transfer_evaluation:
    source: hf_fp16
    target: ollama_q4
    same_images: true
