# Trajectory-Drift ε × seed sweep: 4 epsilons × 3 seeds × 5 samples = 60 records.
experiment:
  name: trajectory_drift_sweep
  phase: "1"
  seeds: [0, 1, 2]
  output_dir: runs/trajectory_drift_sweep

  models:
    - qwen2_5_vl_7b

  tasks:
    - prostate_mri_workup

  task_overrides:
    prostate_mri_workup:
      dataset_split:
        val: 5

  attacks:
    - trajectory_drift_pgd

  attack_overrides:
    trajectory_drift_pgd:
      epsilons: [0.0078, 0.0157, 0.0314, 0.0627]
      steps: [40]
      random_restarts: [1]

  statistics:
    test: wilcoxon_signed_rank
    bootstrap_resamples: 1000
    ci_level: 0.95
    multiple_comparison_correction: none
