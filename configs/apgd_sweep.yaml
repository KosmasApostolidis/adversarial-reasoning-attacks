# APGD ε × seed sweep: 4 epsilons × 3 seeds × 5 samples = 60 records.
experiment:
  name: apgd_sweep
  phase: "1"
  seeds: [0, 1, 2]
  output_dir: runs/apgd_sweep

  models:
    - qwen2_5_vl_7b

  tasks:
    - prostate_mri_workup

  task_overrides:
    prostate_mri_workup:
      dataset_split:
        val: 5

  attacks:
    - apgd_linf

  attack_overrides:
    apgd_linf:
      epsilons: [0.0078, 0.0157, 0.0314, 0.0627]   # 2/255, 4/255, 8/255, 16/255
      steps: [100]
      random_restarts: [1]

  statistics:
    test: wilcoxon_signed_rank
    bootstrap_resamples: 1000
    ci_level: 0.95
    multiple_comparison_correction: none
