# Phase-2 main_benchmark — uniform-noise baseline (no gradient).
# Serves as the "did the attack do anything beyond random pixel perturbation?" control.

experiment:
  name: main_benchmark_noise
  phase: "2"
  seeds: [0, 1, 2, 3, 4]
  output_dir: runs/main/noise

  models:
    - qwen2_5_vl_7b
    - llava_v1_6_mistral_7b

  tasks:
    - prostate_mri_workup
    - rad_vqa_action
    - prostate_mri_targeted

  attacks:
    - pgd_linf            # used only for eps resolution; --mode=noise overrides algorithm

  epsilons_linf: [0.0078, 0.0157, 0.0314, 0.0627, 0.1254]
