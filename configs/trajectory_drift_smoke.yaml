# Trajectory-Drift smoke: Qwen, 5 samples, ε=8/255, 40 PGD steps, KL ascent.
experiment:
  name: trajectory_drift_smoke
  phase: "1"
  seeds: [0]
  output_dir: runs/trajectory_drift_smoke

  models:
    - qwen2_5_vl_7b

  tasks:
    - prostate_mri_workup

  task_overrides:
    prostate_mri_workup:
      dataset_split:
        val: 5

  attacks:
    - trajectory_drift_pgd

  attack_overrides:
    trajectory_drift_pgd:
      epsilons: [0.0314]
      steps: [40]
      random_restarts: [1]

  statistics:
    test: wilcoxon_signed_rank
    bootstrap_resamples: 1000
    ci_level: 0.95
    multiple_comparison_correction: none
