# APGD smoke, paired stock-vs-defended LLaVA-Mistral-7B. Mirrors
# apgd_smoke_llava.yaml at smoke scale; both arms emit to the same records.jsonl
# under model_key={llava_v1_6_mistral_7b, defended_llava_v1_6_mistral_7b}.
experiment:
  name: apgd_smoke_paired_llava
  phase: "1"
  seeds: [0]
  output_dir: runs/apgd_smoke_paired_llava

  models:
    - llava_v1_6_mistral_7b
    - defended_llava_v1_6_mistral_7b

  tasks:
    - prostate_mri_workup

  task_overrides:
    prostate_mri_workup:
      dataset_split:
        val: 5

  attacks:
    - apgd_linf

  attack_overrides:
    apgd_linf:
      epsilons: [0.0314]
      steps: [40]
      random_restarts: [1]

  statistics:
    test: wilcoxon_signed_rank
    bootstrap_resamples: 1000
    ci_level: 0.95
    multiple_comparison_correction: none
