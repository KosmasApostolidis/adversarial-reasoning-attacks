# Trajectory-Drift smoke (LLaVA): KL ascent on full benign trajectory tool-call tokens.
experiment:
  name: trajectory_drift_smoke_llava
  phase: "1"
  seeds: [0]
  output_dir: runs/trajectory_drift_smoke_llava

  models:
    - llava_v1_6_mistral_7b

  tasks:
    - prostate_mri_workup

  task_overrides:
    prostate_mri_workup:
      dataset_split:
        val: 5

  attacks:
    - trajectory_drift

  attack_overrides:
    trajectory_drift:
      epsilons: [0.0314]
      steps: [40]
      random_restarts: [1]

  statistics:
    test: wilcoxon_signed_rank
    bootstrap_resamples: 1000
    ci_level: 0.95
    multiple_comparison_correction: none
